# ── Nginx Reverse Proxy Config for Book-Translator ──
# Architecture: Split routing — /api/* goes to translation-service, everything else to web server.
#
# Place in /etc/nginx/sites-available/book-translator
# Symlink to /etc/nginx/sites-enabled/book-translator
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name songdoi.online www.songdoi.online;

    # Redirect HTTP to HTTPS (uncomment if using SSL)
    # return 301 https://$host$request_uri;

    # ── API Routes → Translation Service :3100 ──────────────────────
    # All /api/* requests go directly to the translation service.
    # No proxy hop through the web server.
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for translation requests
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        # Upload size limit for DOCX parsing
        client_max_body_size 50M;
    }

    # ── Translation Service internal routes (optional monitoring) ────
    # Uncomment to expose health/metrics for monitoring tools.
    # location /translation-service/ {
    #     proxy_pass http://127.0.0.1:3100/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_read_timeout 10s;
    #     allow 127.0.0.1;
    #     deny all;
    # }

    # ── Web App (SPA) → Web Server :3000 ────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Static file caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

